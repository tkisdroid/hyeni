name: Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          # android/variables.gradle pins compileSdk = 36 / targetSdk = 36. The action's
          # default package list does NOT install android-36, so we request it explicitly
          # along with the matching build-tools. Keep android-34 as fallback until the
          # repo drops it (Phase 5 FGS-microphone code still branches on API 34).
          # action auto-accepts Android SDK licenses; no explicit flag needed.
          packages: "platforms;android-36 platforms;android-34 build-tools;36.0.0 build-tools;34.0.0 platform-tools"

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle (vite)
        run: npm run build

      # Capacitor plugin config files (capacitor.build.gradle, capacitor.settings.gradle,
      # capacitor.config.json under assets/, capacitor.plugins.json under assets/) are
      # all committed to the repo, so a full `npx cap sync android` is not required.
      # We only need to copy the freshly built dist/ into android/app/src/main/assets/public/.
      # Keeping cap sync out of the critical path avoids transient CI errors from the
      # Capacitor CLI's platform-validation step (fails on line-ending or SDK-cache state
      # on fresh GitHub runners even though the same command succeeds locally).
      - name: Copy web bundle into Android assets
        run: |
          set -euo pipefail
          mkdir -p android/app/src/main/assets/public
          rm -rf android/app/src/main/assets/public/*
          cp -R dist/. android/app/src/main/assets/public/
          echo "::group::android assets tree (depth=2)"
          find android/app/src/main/assets/public -maxdepth 2 -type f | head -30
          echo "::endgroup::"

      - name: Capacitor plugin check (advisory, non-fatal)
        continue-on-error: true
        run: |
          # Advisory only. If cap sync regenerates plugin config files we want to know,
          # but a failure here must not block the APK build (see step above).
          npx cap sync android 2>&1 | tail -40 || true
          git status --porcelain android/ || true

      - name: Grant gradlew execute permission
        working-directory: android
        run: chmod +x ./gradlew

      # Release signing is opt-in. If all four signing secrets are present we
      # decode the keystore, then build both a signed release APK and Play-ready
      # AAB. Otherwise we run assembleDebug so CI stays green without secrets.
      #
      # To enable signed release builds (Phase 7 / NATIVE-02), add these four
      # secrets to the repo (Settings -> Secrets and variables -> Actions):
      #   ANDROID_KEYSTORE_BASE64    — keystore file, base64-encoded
      #   ANDROID_KEYSTORE_PASSWORD  — password for the keystore
      #   ANDROID_KEY_ALIAS          — key alias inside the keystore
      #   ANDROID_KEY_PASSWORD       — password for the key alias
      - name: Decide build variant
        id: variant
        env:
          HAS_ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
          HAS_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD != '' }}
          HAS_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS != '' }}
          HAS_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD != '' }}
        run: |
          if [ "$HAS_ANDROID_KEYSTORE_BASE64" = "true" ] && \
             [ "$HAS_ANDROID_KEYSTORE_PASSWORD" = "true" ] && \
             [ "$HAS_ANDROID_KEY_ALIAS" = "true" ] && \
             [ "$HAS_ANDROID_KEY_PASSWORD" = "true" ]; then
            echo "task=:app:assembleRelease :app:bundleRelease" >> "$GITHUB_OUTPUT"
            echo "apk_glob=android/app/build/outputs/apk/release/*.apk" >> "$GITHUB_OUTPUT"
            echo "aab_glob=android/app/build/outputs/bundle/release/*.aab" >> "$GITHUB_OUTPUT"
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "task=:app:assembleDebug" >> "$GITHUB_OUTPUT"
            echo "apk_glob=android/app/build/outputs/apk/debug/*.apk" >> "$GITHUB_OUTPUT"
            echo "aab_glob=" >> "$GITHUB_OUTPUT"
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Materialize release keystore (signed path only)
        if: steps.variant.outputs.signed == 'true'
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > android/app/release.keystore
          # Gradle reads the keystore path via ORG_GRADLE_PROJECT_* env vars below.

      - name: Gradle build
        working-directory: android
        env:
          ORG_GRADLE_PROJECT_HYENI_KEYSTORE: ${{ github.workspace }}/android/app/release.keystore
          ORG_GRADLE_PROJECT_HYENI_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_HYENI_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_HYENI_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        shell: bash
        # Tee gradle output to a file so a follow-up step can upload it as an artifact
        # even on failure — GitHub's public API gates step logs behind admin auth,
        # so this is the only way to inspect gradle errors without elevated access.
        # --stacktrace surfaces the exception Groovy/Java stack. --no-daemon keeps the
        # runner clean. pipefail preserves gradle's non-zero exit through tee.
        run: |
          set -o pipefail
          ./gradlew --no-daemon --stacktrace ${{ steps.variant.outputs.task }} 2>&1 | tee "${{ github.workspace }}/gradle-build.log"

      - name: Inspect APK manifest
        shell: bash
        run: |
          set -euo pipefail
          APK_PATH="$(find android/app/build/outputs/apk -name '*.apk' -type f | sort | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No APK found after Gradle build" >&2
            exit 1
          fi
          AAPT="$ANDROID_HOME/build-tools/36.0.0/aapt"
          if [ ! -x "$AAPT" ]; then
            AAPT="$(find "$ANDROID_HOME/build-tools" -name aapt -type f | sort -V | tail -n 1)"
          fi
          if [ -z "$AAPT" ] || [ ! -x "$AAPT" ]; then
            echo "aapt not found in Android SDK build-tools" >&2
            exit 1
          fi
          "$AAPT" dump badging "$APK_PATH" | tee "${{ github.workspace }}/apk-badging.txt"
          "$AAPT" dump xmltree "$APK_PATH" AndroidManifest.xml | tee "${{ github.workspace }}/apk-manifest.xmltree.txt"
          grep -q "package: name='com.hyeni.calendar'" "${{ github.workspace }}/apk-badging.txt"
          grep -q "versionCode='2'" "${{ github.workspace }}/apk-badging.txt"
          grep -q "AmbientListenService" "${{ github.workspace }}/apk-manifest.xmltree.txt"
          grep -q "foregroundServiceType" "${{ github.workspace }}/apk-manifest.xmltree.txt"
          grep -q "isMonitoringTool" "${{ github.workspace }}/apk-manifest.xmltree.txt"
          grep -q "child_monitoring" "${{ github.workspace }}/apk-manifest.xmltree.txt"

      - name: Upload gradle log on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log-${{ github.sha }}
          path: |
            gradle-build.log
            apk-badging.txt
            apk-manifest.xmltree.txt
            android/app/build/outputs/logs/**
            android/build/reports/**
          if-no-files-found: warn
          retention-days: 14

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyeni-calendar-apk-${{ github.sha }}
          path: ${{ steps.variant.outputs.apk_glob }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload AAB artifact
        if: steps.variant.outputs.signed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: hyeni-calendar-aab-${{ github.sha }}
          path: ${{ steps.variant.outputs.aab_glob }}
          if-no-files-found: error
          retention-days: 14
