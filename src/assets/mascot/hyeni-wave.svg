<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" role="img" aria-label="혜니 마스코트 인사">
  <defs>
    <style>
      .wave-arm { transform-origin: 60px 50px; }
      @media (prefers-reduced-motion: no-preference) {
        .wave-arm { animation: hyeni-wave 700ms ease-in-out infinite alternate; }
      }
      @keyframes hyeni-wave {
        0%   { transform: rotate(-12deg); }
        100% { transform: rotate(12deg); }
      }
    </style>
  </defs>
  <!-- Face -->
  <circle cx="48" cy="38" r="22" fill="#FFE4EF" stroke="#F779A8" stroke-width="1.6"/>
  <!-- Eyes (smiling, ‿‿) -->
  <path d="M 38 35 Q 40 38 42 35" stroke="#171719" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 54 35 Q 56 38 58 35" stroke="#171719" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Smile -->
  <path d="M 38 45 Q 48 51 58 45" stroke="#171719" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Cheeks -->
  <circle cx="34" cy="40" r="3.5" fill="#F779A8" opacity="0.5"/>
  <circle cx="62" cy="40" r="3.5" fill="#F779A8" opacity="0.5"/>
  <!-- Cone -->
  <path d="M 32 65 L 64 65 L 48 92 Z" fill="#FFF5FA" stroke="#F779A8" stroke-width="1.6"/>
  <!-- Ice cream scoop -->
  <ellipse cx="48" cy="65" rx="18" ry="8" fill="#FFFFFF" stroke="#F779A8" stroke-width="1.6"/>
  <!-- Sprinkles -->
  <circle cx="40" cy="63" r="2" fill="#F779A8" opacity="0.5"/>
  <circle cx="48" cy="60" r="2" fill="#F779A8" opacity="0.5"/>
  <circle cx="56" cy="64" r="2" fill="#F779A8" opacity="0.5"/>
  <!-- Wave hand -->
  <g class="wave-arm">
    <circle cx="74" cy="32" r="6" fill="#FFF5FA" stroke="#F779A8" stroke-width="1.5"/>
  </g>
</svg>
